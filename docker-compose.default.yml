services:
  embedding-mock:
    image: php:8.3-cli
    working_dir: /app
    command: php -S 0.0.0.0:8080 /app/server.php
    environment:
      EMBEDDING_DIMENSIONS: ${RETRIEVER_EMBEDDING_DIMENSIONS:-16}
    ports:
      - "${RETRIEVER_EMBEDDING_PORT:-18080}:8080"
    volumes:
      - ./docker/embedding-mock:/app:ro

  db-mariadb:
    image: mariadb:${RETRIEVER_MARIADB_VERSION:-11.8}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "${RETRIEVER_MARIADB_PORT:-33071}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -uwordpress -pwordpress --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - retriever_default_mariadb_data:/var/lib/mysql

  wp-mariadb:
    image: wordpress:php8.3-apache
    depends_on:
      db-mariadb:
        condition: service_healthy
      embedding-mock:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db-mariadb:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', false );
    ports:
      - "${RETRIEVER_WP_MARIADB_PORT:-8081}:80"
    volumes:
      - retriever_default_wp_mariadb_html:/var/www/html

  wpcli-mariadb:
    image: wordpress:cli-php8.3
    depends_on:
      db-mariadb:
        condition: service_healthy
      wp-mariadb:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db-mariadb:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - retriever_default_wp_mariadb_html:/var/www/html
    profiles: ["tools"]

  db-mysql:
    image: mysql:${RETRIEVER_MYSQL_VERSION:-9.4}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "${RETRIEVER_MYSQL_PORT:-33072}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uwordpress -pwordpress --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - retriever_default_mysql_data:/var/lib/mysql

  wp-mysql:
    image: wordpress:php8.3-apache
    depends_on:
      db-mysql:
        condition: service_healthy
      embedding-mock:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db-mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', false );
    ports:
      - "${RETRIEVER_WP_MYSQL_PORT:-8082}:80"
    volumes:
      - retriever_default_wp_mysql_html:/var/www/html

  wpcli-mysql:
    image: wordpress:cli-php8.3
    depends_on:
      db-mysql:
        condition: service_healthy
      wp-mysql:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db-mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - retriever_default_wp_mysql_html:/var/www/html
    profiles: ["tools"]

volumes:
  retriever_default_mariadb_data:
  retriever_default_mysql_data:
  retriever_default_wp_mariadb_html:
  retriever_default_wp_mysql_html:
